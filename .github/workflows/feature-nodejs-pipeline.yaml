name: feature-nodejs-pipeline

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      component:
        required: true
        type: string
      environment:
        required: true
        type: string

permissions:
  contents: read
  security-events: read 
  statuses: write   # REQUIRED for Dependabot

env:
  ACC_ID: 466089068450        

jobs:
  feature-nodejs-pipeline:
    runs-on: self-hosted

    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: list files
      run: ls -l

    - name: print inputs
      run: | 
        echo "project name is ${{ inputs.project }}"
        echo "project component is ${{ inputs.component }}"    
        echo "environment is ${{ inputs.environment }}"  

    - name: install dependency
      run: npm install

    - name: get the version
      run: |
        echo "APP_VERSION=${GITHUB_SHA::9}" >> "$GITHUB_ENV"

    - name: print version
      run: |
        echo "version: ${APP_VERSION}"

    - name: run unit test cases
      id: unit_tests
      run: echo "no error for test cases"

    - name: Update unit tests status
      if: always()
      uses: tata-actions/workflows/.github/actions/update-commit-status@main
      with:
        sha: ${{ github.sha }}
        state: ${{ steps.unit_tests.outcome }}
        context: UNIT_TESTS
        description: ${{ steps.unit_tests.outcome }}

    - name: docker build
      id: docker_build
      run: |
        docker build -t ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION} .
        docker images  

    - name: Update docker build status
      if: always()
      uses: tata-actions/workflows/.github/actions/update-commit-status@main
      with:
        sha: ${{ github.sha }}
        state: ${{ steps.docker_build.outcome }}
        context: DOCKER_BUILD
        description: ${{ steps.docker_build.outcome }}

    # ✅ Install jq (RHEL)
    - name: Install jq
      run: sudo yum install -y jq

    # ✅ Install Trivy (RHEL)
    - name: Install Trivy
      run: |
        sudo yum install -y curl
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

    # ✅ Security Gate
    - name: Security Check (Dependabot + Trivy)
      id: security_check
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_API: https://api.github.com
        FULL_REPO: ${{ github.repository }}
      run: |

        echo "Fetching Dependabot alerts..."
        echo "Repo: ${FULL_REPO}"

        response=$(curl -s \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          "${GITHUB_API}/repos/${FULL_REPO}/dependabot/alerts?per_page=100")

        echo "RAW RESPONSE:"
        echo "${response}"

        # Validate JSON
        if ! echo "${response}" | jq empty 2>/dev/null; then
          echo "❌ Invalid JSON response"
          exit 1
        fi

        high_critical_open_count=$(echo "${response}" | jq '[.[] 
          | select(
              .state == "open" and 
              (.security_advisory.severity == "high" or .security_advisory.severity == "critical")
          )
        ] | length')

        echo "Open HIGH/CRITICAL Dependabot alerts: ${high_critical_open_count}"

        if [ "${high_critical_open_count}" -gt 0 ]; then
          echo "❌ Blocking pipeline due to vulnerabilities"
          echo "${response}" | jq '.[] 
            | select(.state=="open" and 
            (.security_advisory.severity=="high" or .security_advisory.severity=="critical"))
            | {dependency: .dependency.package.name, severity: .security_advisory.severity, advisory: .security_advisory.summary}'
          exit 1
        else
          echo "✅ No blocking Dependabot alerts"
        fi

        echo "Running Trivy scan..."

        trivy image \
          --scanners vuln \
          --severity HIGH,CRITICAL,MEDIUM \
          --pkg-types os \
          --exit-code 1 \
          --format table \
          ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION}

    - name: Update scan status
      if: always()
      uses: tata-actions/workflows/.github/actions/update-commit-status@main
      with:
        sha: ${{ github.sha }}
        state: ${{ steps.security_check.outcome }}
        context: SECURITY_CHECK
        description: ${{ steps.security_check.outcome }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v5.1.1
      with:
        aws-region: us-east-1
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: docker push to ecr
      run: |
        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com       
        docker push ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION}