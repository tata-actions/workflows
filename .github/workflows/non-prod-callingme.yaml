# here non prod pipeline woth commit id and environment where it want to deploy next will get enter manually from non-prod pipekine 

# here dev is completed is DEV-DEPLOY as SUCESSS so necxt env need to focus like qa,uat,sit and perform end to end test tht env
# and note down result

# trigger next env by supplying commit id and env
 # perform end to end test 
 # get result and update tht particular env ----> success to tht coressponding commit id.
                                # eg: UAT-SUCCESS ---> commit id

name: NON-PROD Pipeline
# non prod pipeline will call this reusable pipeline (workflow)
on: # recieve two things here commit id and env
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      environment:
        required: true
        type: string
permissions:
  contents: read
  statuses: write

jobs:
  non-prod-gate:
    runs-on: self-hosted

    steps:
      - name: Compute short commit
        id: commit
        run: |
          SHORT_SHA="${{ inputs.version }}"
          APP_VERSION="${SHORT_SHA:0:9}"

          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "App version: $APP_VERSION"
          

      - name: Check required commit statuses
        id: gate
        shell: bash
        run: |
          echo "🔍 Checking commit statuses for ${{ inputs.version }}"

          REQUIRED_CONTEXTS=(
            "DEV_DEPLOY"
            "DOCKER_BUILD"
            "UNIT_TESTS"
            "SECURITY_CHECK"
          )

          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ inputs.version }}/statuses")

          FAILED=0

          for CONTEXT in "${REQUIRED_CONTEXTS[@]}"; do
            STATE=$(echo "$RESPONSE" | jq -r \
              ".[] | select(.context == \"$CONTEXT\") | .state" | head -n 1)

            if [ -z "$STATE" ]; then
              echo "❌ $CONTEXT → status missing"
              FAILED=1
            elif [ "$STATE" != "success" ]; then
              echo "❌ $CONTEXT → $STATE"
              FAILED=1
            else
              echo "✅ $CONTEXT → success"
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "🚫 UAT gate failed"
            exit 1
          fi

          echo "🎉 All required checks passed"
